version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: "bundler"
    directory: "/ios"
    schedule:
      interval: "monthly"
    labels:
      - "ios"
    commit-message:
      prefix: "chore(deps)"
